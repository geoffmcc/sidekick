version: "3.8"

# Sidekick Docker Services
# These run as on-demand systemd wrappers (sidekick-postgres, sidekick-redis, etc.)
# Start individually: sudo systemctl start sidekick-postgres
# Or all at once: docker compose -f /home/sidekick/sidekick/docker/docker-compose.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: sidekick-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sidekick
      POSTGRES_PASSWORD: ${SIDEKICK_POSTGRES_PASSWORD:?}
      POSTGRES_DB: sidekick
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sidekick"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - postgres

  redis:
    image: redis:7-alpine
    container_name: sidekick-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - ./data/redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - redis

  qdrant:
    image: qdrant/qdrant:latest
    container_name: sidekick-qdrant
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
      - "127.0.0.1:6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD", "/usr/bin/bash", "-c", "echo > /dev/tcp/localhost/6333"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - qdrant

  influxdb:
    image: influxdb:2-alpine
    container_name: sidekick-influxdb
    restart: unless-stopped
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: sidekick
      DOCKER_INFLUXDB_INIT_PASSWORD: ${SIDEKICK_INFLUX_PASSWORD:?}
      DOCKER_INFLUXDB_INIT_ORG: sidekick
      DOCKER_INFLUXDB_INIT_BUCKET: sidekick
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${SIDEKICK_INFLUX_TOKEN:?set SIDEKICK_INFLUX_TOKEN}
    ports:
      - "127.0.0.1:8086:8086"
    volumes:
      - ./data/influxdb:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - influxdb

  grafana:
    image: grafana/grafana:latest
    container_name: sidekick-grafana
    restart: unless-stopped
    user: "1001:1001"
    environment:
      GF_SECURITY_ADMIN_USER: sidekick
      GF_SECURITY_ADMIN_PASSWORD: ${SIDEKICK_GRAFANA_ADMIN_PASSWORD:?}
      GF_SERVER_HTTP_PORT: "3000"
      GF_INSTALL_PLUGINS: "grafana-clock-panel"
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_ROOT_URL: ${SIDEKICK_GRAFANA_ROOT_URL:-http://localhost:4098/grafana/}
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_AUTH_PROXY_ENABLED: "true"
      GF_AUTH_PROXY_HEADER_NAME: "X-WEBAUTH-USER"
      GF_AUTH_PROXY_HEADER_PROPERTY: "username"
      GF_AUTH_PROXY_AUTO_SIGN_UP: "true"
      # Grafana interpolates ${VAR} in provisioning files from its OWN process
      # environment, so the InfluxDB datasource token in
      # grafana/provisioning/datasources/influxdb.yml only resolves if the
      # variable is passed into THIS container. Compose's --env-file drives
      # compose-level substitution, not the container environment. Fail closed
      # (:?) rather than silently provisioning an empty token again.
      SIDEKICK_INFLUX_TOKEN: ${SIDEKICK_INFLUX_TOKEN:?set SIDEKICK_INFLUX_TOKEN}
    ports:
      - "0.0.0.0:3000:3000"
    volumes:
      - ./data/grafana:/var/lib/grafana
      - ../grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../grafana/provisioning/alerting:/etc/grafana/provisioning/alerting:ro
      - ../grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - grafana
